<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" preserveAspectRatio="xMidYMax meet">
  <defs>
    <linearGradient id="stormSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#060606"/>
      <stop offset="50%" stop-color="#0e0e0e"/>
      <stop offset="100%" stop-color="#161410"/>
    </linearGradient>
    <linearGradient id="fieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1608"/>
      <stop offset="100%" stop-color="#0e0c06"/>
    </linearGradient>
    <linearGradient id="boltGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8e8c8"/>
      <stop offset="100%" stop-color="#b8a840"/>
    </linearGradient>
    <filter id="boltGlow">
      <feGaussianBlur stdDeviation="4" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cloudBlur">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="900" height="520" fill="url(#stormSky)"/>

  <!-- Heavy storm clouds -->
  <ellipse cx="200" cy="80" rx="220" ry="80" fill="#0a0a0a" filter="url(#cloudBlur)"/>
  <ellipse cx="500" cy="60" rx="280" ry="90" fill="#0d0d0d" filter="url(#cloudBlur)"/>
  <ellipse cx="780" cy="90" rx="200" ry="70" fill="#0a0a0a" filter="url(#cloudBlur)"/>
  <ellipse cx="350" cy="120" rx="320" ry="100" fill="#111" filter="url(#cloudBlur)"/>
  <ellipse cx="650" cy="110" rx="260" ry="85" fill="#0e0e0e" filter="url(#cloudBlur)"/>

  <!-- Cloud mass solid -->
  <path d="M0,0 L900,0 L900,200 Q750,140 600,170 Q450,200 300,155 Q150,110 0,160 Z" fill="#0e0e0e"/>

  <!-- Horizon / sky-ground boundary: dark wheat field -->
  <rect x="0" y="330" width="900" height="190" fill="url(#fieldGrad)"/>

  <!-- Horizon line glow -->
  <rect x="0" y="327" width="900" height="6" fill="#2a2418" opacity="0.6"/>

  <!-- Wheat stalks — broken and beaten -->
  <!-- Left field section -->
  <line x1="30"  y1="520" x2="45"  y2="370" stroke="#1e1a0e" stroke-width="1.5"/>
  <line x1="45"  y1="370" x2="38"  y2="345" stroke="#1e1a0e" stroke-width="1.5"/>
  <line x1="55"  y1="520" x2="62"  y2="380" stroke="#1e1a0e" stroke-width="1.5"/>
  <line x1="62"  y1="380" x2="70"  y2="355" stroke="#1e1a0e" stroke-width="1.5"/>
  <line x1="80"  y1="520" x2="75"  y2="375" stroke="#1e1a0e" stroke-width="1.5"/>
  <line x1="100" y1="520" x2="108" y2="365" stroke="#1e1a0e" stroke-width="1.5"/>
  <line x1="108" y1="365" x2="98"  y2="340" stroke="#1e1a0e" stroke-width="1.5"/>
  <!-- bent stalks -->
  <path d="M120,520 Q118,440 140,400 Q148,385 138,365" fill="none" stroke="#1e1a0e" stroke-width="1.5"/>
  <path d="M145,520 Q142,445 155,410 Q162,395 150,372" fill="none" stroke="#1e1a0e" stroke-width="1.5"/>
  <path d="M170,520 Q168,450 185,408" fill="none" stroke="#1e1a0e" stroke-width="1.5"/>

  <!-- Middle field section - more broken -->
  <path d="M260,520 Q255,460 280,420 Q295,400 285,375" fill="none" stroke="#1a160a" stroke-width="1.5"/>
  <path d="M295,520 Q290,455 310,415" fill="none" stroke="#1a160a" stroke-width="1.5"/>
  <line x1="320" y1="520" x2="330" y2="390" stroke="#1a160a" stroke-width="1.5"/>
  <line x1="330" y1="390" x2="318" y2="360" stroke="#1a160a" stroke-width="1.5"/>
  <path d="M355,520 Q350,460 365,420 Q372,400 360,378" fill="none" stroke="#1a160a" stroke-width="1.5"/>
  <line x1="390" y1="520" x2="398" y2="380" stroke="#1a160a" stroke-width="1.5"/>
  <path d="M420,520 Q415,455 430,415" fill="none" stroke="#1a160a" stroke-width="1.5"/>
  <path d="M450,520 Q445,460 460,418 Q468,395 455,370" fill="none" stroke="#1a160a" stroke-width="1.5"/>

  <!-- Right field section -->
  <line x1="580" y1="520" x2="590" y2="378" stroke="#1a160a" stroke-width="1.5"/>
  <path d="M610,520 Q607,450 622,408" fill="none" stroke="#1a160a" stroke-width="1.5"/>
  <path d="M645,520 Q640,455 655,415 Q662,398 650,375" fill="none" stroke="#1a160a" stroke-width="1.5"/>
  <line x1="680" y1="520" x2="688" y2="372" stroke="#1a160a" stroke-width="1.5"/>
  <line x1="688" y1="372" x2="676" y2="348" stroke="#1a160a" stroke-width="1.5"/>
  <path d="M710,520 Q706,460 720,420" fill="none" stroke="#1a160a" stroke-width="1.5"/>
  <line x1="750" y1="520" x2="758" y2="380" stroke="#1a160a" stroke-width="1.5"/>
  <path d="M785,520 Q780,452 795,408" fill="none" stroke="#1a160a" stroke-width="1.5"/>
  <line x1="820" y1="520" x2="828" y2="370" stroke="#1a160a" stroke-width="1.5"/>
  <line x1="855" y1="520" x2="862" y2="378" stroke="#1a160a" stroke-width="1.5"/>
  <line x1="880" y1="520" x2="886" y2="368" stroke="#1a160a" stroke-width="1.5"/>

  <!-- Wheat heads on some stalks -->
  <ellipse cx="45"  cy="342" rx="5" ry="12" fill="#221e10" transform="rotate(15,45,342)"/>
  <ellipse cx="70"  cy="352" rx="4" ry="10" fill="#221e10" transform="rotate(-10,70,352)"/>
  <ellipse cx="108" cy="338" rx="5" ry="11" fill="#221e10" transform="rotate(8,108,338)"/>
  <ellipse cx="330" cy="357" rx="5" ry="12" fill="#1e1a0e" transform="rotate(12,330,357)"/>
  <ellipse cx="688" cy="345" rx="5" ry="12" fill="#1e1a0e" transform="rotate(-8,688,345)"/>

  <!-- Lightning bolt main -->
  <path d="M540,5 L510,110 L530,110 L500,225 L525,225 L480,340" fill="url(#boltGrad)" filter="url(#boltGlow)" opacity="0.9"/>
  <!-- Lightning bolt secondary branch -->
  <path d="M512,165 L490,220 L505,220 L475,285" fill="url(#boltGrad)" filter="url(#boltGlow)" opacity="0.5"/>

  <!-- Lightning ambient glow on ground -->
  <ellipse cx="490" cy="335" rx="150" ry="30" fill="#d4c84a" opacity="0.04" filter="url(#cloudBlur)"/>

  <!-- Hail suggestion: a few white dots -->
  <circle cx="140" cy="280" r="1.8" fill="#c8d0d8" opacity="0.6"/>
  <circle cx="200" cy="240" r="1.5" fill="#c8d0d8" opacity="0.5"/>
  <circle cx="70"  cy="310" r="2.0" fill="#c8d0d8" opacity="0.7"/>
  <circle cx="320" cy="260" r="1.6" fill="#c8d0d8" opacity="0.5"/>
  <circle cx="420" cy="290" r="1.8" fill="#c8d0d8" opacity="0.6"/>
  <circle cx="600" cy="250" r="1.5" fill="#c8d0d8" opacity="0.4"/>
  <circle cx="720" cy="280" r="2.0" fill="#c8d0d8" opacity="0.6"/>
  <circle cx="810" cy="260" r="1.6" fill="#c8d0d8" opacity="0.5"/>
</svg>
