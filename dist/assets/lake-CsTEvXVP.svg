<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="lakeSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#05101a"/>
      <stop offset="48%" stop-color="#0a1a2a"/>
      <stop offset="52%" stop-color="#0c1e30"/>
      <stop offset="100%" stop-color="#071018"/>
    </linearGradient>
    <radialGradient id="lakeMoonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d0d8e0" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#0a1a2a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lakeReflGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d0d8e0" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0c1e30" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="waterShimmer" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0a1a2a"/>
      <stop offset="45%" stop-color="#0d2038"/>
      <stop offset="55%" stop-color="#0d2038"/>
      <stop offset="100%" stop-color="#0a1a2a"/>
    </linearGradient>
    <filter id="moonSoft">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="waterBlur">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
    <clipPath id="skyClip">
      <rect x="0" y="0" width="900" height="260"/>
    </clipPath>
    <clipPath id="waterClip">
      <rect x="0" y="260" width="900" height="260"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="url(#lakeSky)"/>

  <!-- Horizon line (water surface) -->
  <rect x="0" y="256" width="900" height="8" fill="#0d2038"/>

  <!-- ═══════ SKY HALF ═══════ -->

  <!-- Moon glow in sky -->
  <ellipse cx="450" cy="105" rx="85" ry="85" fill="url(#lakeMoonGlow)"/>
  <!-- Moon -->
  <circle cx="450" cy="105" r="30" fill="#d8e4ec" opacity="0.92" filter="url(#moonSoft)"/>
  <!-- Moon inner detail -->
  <circle cx="450" cy="105" r="28" fill="#e4ecf2" opacity="0.6"/>

  <!-- Stars in sky -->
  <circle cx="85"  cy="30"  r="1.3" fill="#c8d4de" opacity="0.75"/>
  <circle cx="165" cy="55"  r="0.9" fill="#c8d4de" opacity="0.55"/>
  <circle cx="235" cy="20"  r="1.1" fill="#c8d4de" opacity="0.80"/>
  <circle cx="310" cy="45"  r="0.8" fill="#c8d4de" opacity="0.60"/>
  <circle cx="375" cy="38"  r="1.0" fill="#c8d4de" opacity="0.70"/>
  <circle cx="525" cy="38"  r="1.0" fill="#c8d4de" opacity="0.70"/>
  <circle cx="590" cy="45"  r="0.8" fill="#c8d4de" opacity="0.60"/>
  <circle cx="660" cy="20"  r="1.1" fill="#c8d4de" opacity="0.80"/>
  <circle cx="738" cy="55"  r="0.9" fill="#c8d4de" opacity="0.55"/>
  <circle cx="818" cy="30"  r="1.3" fill="#c8d4de" opacity="0.75"/>
  <circle cx="130" cy="90"  r="0.7" fill="#c8d4de" opacity="0.45"/>
  <circle cx="280" cy="80"  r="0.9" fill="#c8d4de" opacity="0.55"/>
  <circle cx="620" cy="80"  r="0.9" fill="#c8d4de" opacity="0.55"/>
  <circle cx="770" cy="90"  r="0.7" fill="#c8d4de" opacity="0.45"/>
  <circle cx="55"  cy="120" r="0.8" fill="#c8d4de" opacity="0.50"/>
  <circle cx="848" cy="120" r="0.8" fill="#c8d4de" opacity="0.50"/>

  <!-- Left tree silhouette (sky) -->
  <!-- Trunk -->
  <rect x="62" y="180" width="8" height="80" fill="#050e16"/>
  <rect x="135" y="195" width="7" height="65" fill="#050e16"/>
  <!-- Foliage layers -->
  <path d="M0,260 Q40,240 70,200 Q90,175 100,180 Q115,175 125,185 Q140,170 155,195 Q180,215 220,245 Q240,252 260,258 L260,260 Z" fill="#061218"/>
  <path d="M0,260 Q50,250 90,235 Q120,225 160,240 Q200,255 260,260 Z" fill="#071522"/>

  <!-- Right tree silhouette (sky) — mirror -->
  <rect x="830" y="180" width="8" height="80" fill="#050e16"/>
  <rect x="758" y="195" width="7" height="65" fill="#050e16"/>
  <path d="M900,260 Q860,240 830,200 Q810,175 800,180 Q785,175 775,185 Q760,170 745,195 Q720,215 680,245 Q660,252 640,258 L640,260 Z" fill="#061218"/>
  <path d="M900,260 Q850,250 810,235 Q780,225 740,240 Q700,255 640,260 Z" fill="#071522"/>

  <!-- ═══════ WATER HALF ═══════ -->
  <!-- Water base -->
  <rect x="0" y="260" width="900" height="260" fill="#0c1e30"/>

  <!-- Water shimmer bands -->
  <rect x="0" y="260" width="900" height="260" fill="url(#waterShimmer)"/>

  <!-- Moon reflection in water -->
  <ellipse cx="450" cy="415" rx="85" ry="85" fill="url(#lakeReflGlow)"/>
  <!-- Reflection disc (slightly blurred/distorted) -->
  <ellipse cx="450" cy="415" rx="28" ry="18" fill="#d0dce6" opacity="0.75" filter="url(#waterBlur)"/>
  <!-- Reflection shimmer streak -->
  <rect x="440" y="335" width="20" height="80" fill="#c8d8e4" opacity="0.12" filter="url(#waterBlur)"/>

  <!-- Horizontal water ripple lines (very subtle) -->
  <line x1="200" y1="310" x2="700" y2="310" stroke="#0f2540" stroke-width="0.8" opacity="0.6"/>
  <line x1="150" y1="330" x2="750" y2="330" stroke="#0f2540" stroke-width="0.6" opacity="0.4"/>
  <line x1="180" y1="350" x2="720" y2="350" stroke="#0f2540" stroke-width="0.6" opacity="0.5"/>
  <line x1="160" y1="375" x2="740" y2="375" stroke="#0f2540" stroke-width="0.5" opacity="0.4"/>
  <line x1="200" y1="400" x2="700" y2="400" stroke="#0f2540" stroke-width="0.5" opacity="0.3"/>
  <line x1="220" y1="425" x2="680" y2="425" stroke="#0f2540" stroke-width="0.4" opacity="0.3"/>
  <line x1="250" y1="450" x2="650" y2="450" stroke="#0f2540" stroke-width="0.4" opacity="0.2"/>

  <!-- Left tree reflection (water — inverted) -->
  <path d="M0,260 Q50,270 90,285 Q120,295 160,280 Q200,265 260,260 Z" fill="#071522"/>
  <path d="M0,260 Q40,280 70,320 Q90,345 100,340 Q115,345 125,335 Q140,350 155,325 Q180,305 220,275 Q240,268 260,262 L260,260 Z" fill="#061218"/>
  <rect x="62"  y="260" width="8" height="80" fill="#050e16"/>
  <rect x="135" y="260" width="7" height="65" fill="#050e16"/>

  <!-- Right tree reflection (water — inverted) -->
  <path d="M900,260 Q850,270 810,285 Q780,295 740,280 Q700,265 640,260 Z" fill="#071522"/>
  <path d="M900,260 Q860,280 830,320 Q810,345 800,340 Q785,345 775,335 Q760,350 745,325 Q720,305 680,275 Q660,268 640,262 L640,260 Z" fill="#061218"/>
  <rect x="830" y="260" width="8" height="80" fill="#050e16"/>
  <rect x="758" y="260" width="7" height="65" fill="#050e16"/>

  <!-- Shore/bank line -->
  <path d="M0,258 Q100,254 200,256 Q350,260 450,258 Q550,256 700,260 Q800,262 900,258" fill="none" stroke="#0a1e30" stroke-width="3"/>

  <!-- Single leaf on water surface -->
  <ellipse cx="490" cy="265" rx="6" ry="3" fill="#0a2018" opacity="0.8" transform="rotate(-15,490,265)"/>
</svg>
